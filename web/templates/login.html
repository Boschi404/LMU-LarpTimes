<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMU LarpTimes — Accesso</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #0a0e18;
  color: #f0f4ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #11151f;
  border: 1px solid #2d333b;
  border-radius: 16px;
  padding: 48px 40px 36px;
  width: 420px;
  max-width: 90vw;
  text-align: center;
}
.card h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
.card .subtitle { color: #7d8590; font-size: 13px; margin-bottom: 32px; }
.brand-bar {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, #1dd1a1, #4a9eff);
  border-radius: 2px;
  margin: 0 auto 24px;
}
.tabs { display: flex; gap: 0; margin-bottom: 28px; background: #0a0e18; border-radius: 8px; padding: 3px; }
.tab { flex: 1; padding: 10px; border: none; background: transparent; color: #7d8590; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.tab.active { background: #4a9eff; color: #fff; }
.form-group { text-align: left; margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7d8590; margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 12px 14px; background: #0a0e18;
  border: 1px solid #2d333b; border-radius: 8px; color: #f0f4ff;
  font-size: 15px; font-family: 'JetBrains Mono', monospace;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: #4a9eff; }
.form-group input::placeholder { color: #505664; }
.btn {
  width: 100%; padding: 12px; background: #4a9eff; border: none;
  border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.2s; margin-top: 8px;
}
.btn:hover { background: #3a7ecc; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: #2d333b; margin-top: 4px; }
.btn-secondary:hover { background: #3d434b; }
.error-msg { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
.info-msg { color: #1dd1a1; font-size: 13px; margin-top: 12px; display: none;}
.footer { margin-top: 24px; font-size: 12px; color: #505664; }
.form-box { display: none; }
.form-box.active { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="brand-bar"></div>
  <h1>LMU LarpTimes</h1>
  <p class="subtitle">Pit Strategist</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')" id="tab-login">Accedi</button>
    <button class="tab" onclick="switchTab('register')" id="tab-register">Registrati</button>
  </div>

  <div id="form-login" class="form-box active">
    <div class="form-group">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="tu@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="●●●●●●" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Accedi</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <div id="form-register" class="form-box">
    <div class="form-group">
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="tu@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Nome visualizzato</label>
      <input id="reg-name" type="text" placeholder="Il tuo nome">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="reg-password" type="password" placeholder="min 4 caratteri" autocomplete="new-password">
    </div>
    <button class="btn" id="reg-btn" onclick="doRegister()">Crea account</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="info-msg" id="reg-info"></div>
  </div>

  <p class="footer">I tuoi dati restano sul tuo computer.</p>
</div>

<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
  document.getElementById('form-' + tab).classList.add('active');
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('reg-error').style.display = 'none';
}

async function apiCall(url, data) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  return { ok: r.ok, status: r.status, data: await r.json() };
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  if (!email || !password) {
    err.textContent = 'Compila tutti i campi';
    err.style.display = 'block'; return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Accesso in corso...';

  const res = await apiCall('/api/auth/login', { email, password });
  if (res.ok) {
    localStorage.setItem('token', res.data.token);
    localStorage.setItem('user', JSON.stringify(res.data.user));
    window.location.href = '/';
  } else {
    err.textContent = res.data.error || 'Email o password errati';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Accedi';
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const display_name = document.getElementById('reg-name').value.trim() || email.split('@')[0];
  const password = document.getElementById('reg-password').value;
  const err = document.getElementById('reg-error');
  const info = document.getElementById('reg-info');
  err.style.display = 'none'; info.style.display = 'none';

  if (!email || !password) {
    err.textContent = 'Compila tutti i campi';
    err.style.display = 'block'; return;
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Registrazione in corso...';

  const res = await apiCall('/api/auth/register', { email, password, display_name });
  if (res.ok) {
    info.textContent = 'Account creato! Reindirizzamento...';
    info.style.display = 'block';
    localStorage.setItem('token', res.data.token);
    localStorage.setItem('user', JSON.stringify(res.data.user));
    setTimeout(() => window.location.href = '/', 500);
  } else {
    err.textContent = res.data.error || 'Errore di registrazione';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Crea account';
}

// Enter key support
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
